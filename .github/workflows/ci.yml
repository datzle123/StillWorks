# Ordinary repository CI: this executes PR-controlled package scripts and is not a MergeVow PR
# Drift Gate or a hostile-code isolation boundary.
name: Repository CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium And Linux Dependencies
        if: runner.os == 'Linux'
        run: pnpm browser:install

      - name: Install Chromium
        if: runner.os != 'Linux'
        run: pnpm exec playwright install --only-shell chromium

      - name: Check preparation and code
        run: pnpm check
